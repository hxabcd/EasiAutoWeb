name: Sync and Self-Destruct

on:
  push:
    paths:
      - "public/update.json"
  workflow_dispatch: # 允许你手动触发测试

jobs:
  sync-and-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          # 注意：自毁需要写权限，默认 GITHUB_TOKEN 通常够用，
          # 但建议这里也用你配置的 SYNC_TOKEN 以确保万无一失
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Check Expiry and Self-Destruct
        run: |
          CURRENT_DATE=$(date +%Y%m%d)
          EXPIRY_DATE="20270101"

          if [ "$CURRENT_DATE" -ge "$EXPIRY_DATE" ]; then
            echo "Date is $CURRENT_DATE. Initiating self-destruct..."
            
            # 配置 Git 身份
            git config --global user.email "github-actions@github.com"
            git config --global user.name "GitHub Actions"
            
            # 删除工作流文件本身（假设路径是下面这个，请核对文件名）
            rm .github/workflows/transfer_manifest.yaml
            
            git add .github/workflows/transfer_manifest.yaml
            git commit -m "Workflow expired: Self-destructing"
            git push origin main
            
            echo "Workflow file deleted from repository. This is the last run."
            exit 0
          fi

      - name: Push to Destination Repo
        run: |
          # 这里保持原来的同步逻辑...
          git clone https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/hxabcd/0xabcd-log.git destination
          mkdir -p destination/public/update/
          cp public/update.json destination/public/update/EasiAuto.json
          cd destination
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git add public/update/EasiAuto.json
          if git diff-index --quiet HEAD; then
            echo "No changes"
          else
            git commit -m "Auto-sync"
            git push origin master
          fi
